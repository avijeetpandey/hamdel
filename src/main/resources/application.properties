spring.application.name=hamdel

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── LMAX Disruptor ring buffer ────────────────────────────────────────────────
hamdel.buffer.ring-buffer-size=65536

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/hamdel
spring.datasource.username=hamdel
spring.datasource.password=hamdel
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
hamdel.kafka.topic=heartbeat-events
hamdel.kafka.dlt=heartbeat-events-dlt
hamdel.kafka.partitions=24
hamdel.kafka.consumer-group=hamdel-kpi-group

# ── Consumer toggle (set false in ingress-only K8s pods) ─────────────────────
hamdel.consumer.enabled=true

# ── Resilience4j — Kafka circuit breaker ──────────────────────────────────────
resilience4j.circuitbreaker.instances.kafkaProducer.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaProducer.sliding-window-size=20
resilience4j.circuitbreaker.instances.kafkaProducer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaProducer.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafkaProducer.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.kafkaProducer.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.kafkaProducer.register-health-indicator=true

# ── Actuator / Prometheus ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics,loggers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=hamdel
